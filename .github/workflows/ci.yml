#Current CI already catches:
# Lint errors
# Build failures
# Basic security

# Will add tests later if App grows (20+ components)

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Prevent duplicate runs: Ensure only one CI runs per ref/PR
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  actions: read
  checks: write

jobs:
  lint-and-security:
    name: Lint & Security Checks
    runs-on: ubuntu-latest
    # Always run CI for code quality - let concurrency control handle duplicates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for secret scanning

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        # continue-on-error: false
        
      # Software Composition Analysis (SCA)
      - name: Run npm audit (SCA)
        run: npm audit --audit-level=high
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-security
     # Always run tests - let concurrency control handle duplicates

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test

  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: [lint-and-security, test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.html


